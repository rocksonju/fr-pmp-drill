<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMP Brief Formatter — MD to DOCX & PDF</title>

<!-- Dependencies via CDN -->
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<script src="https://unpkg.com/html-docx-js@0.3.1/dist/html-docx.js"></script>

<style>
/* ===== RESET & VARS ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:        #1e3a5f;
  --navy-dark:   #152b47;
  --blue:        #2c5282;
  --blue-light:  #ebf4ff;
  --accent:      #3182ce;
  --red:         #c53030;
  --green:       #276749;
  --gray-bg:     #edf2f7;
  --gray-border: #cbd5e0;
  --text:        #2d3748;
  --text-muted:  #718096;
  --white:       #ffffff;
  --shadow:      0 4px 24px rgba(0,0,0,0.1);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  background: var(--gray-bg);
  color: var(--text);
  min-height: 100vh;
}

/* ===== APP BAR ===== */
.app-bar {
  position: sticky; top: 0; z-index: 200;
  background: var(--navy);
  padding: 0.85rem 1.5rem;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 16px rgba(0,0,0,0.3);
}

.app-bar-brand { display: flex; align-items: center; gap: 0.75rem; }
.app-bar-icon {
  width: 36px; height: 36px; border-radius: 8px;
  background: rgba(255,255,255,0.12);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
}
.app-bar-title { color: white; font-size: 0.95rem; font-weight: 700; line-height: 1.2; }
.app-bar-sub   { color: rgba(255,255,255,0.55); font-size: 0.68rem; }

.btn-row { display: flex; gap: 7px; align-items: center; }

.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 0.42rem 1rem; border-radius: 6px; border: none;
  font-size: 0.8rem; font-weight: 700; cursor: pointer;
  transition: opacity 0.15s, background 0.15s, transform 0.1s;
  letter-spacing: 0.01em;
}
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
.btn svg { flex-shrink: 0; }

.btn-pdf  { background: #e53e3e; color: white; }
.btn-pdf:hover  { background: #c53030; }
.btn-docx { background: #2b6cb0; color: white; }
.btn-docx:hover { background: #2c5282; }
.btn-ghost {
  background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.85);
  border: 1px solid rgba(255,255,255,0.2);
}
.btn-ghost:hover { background: rgba(255,255,255,0.2); }

.spinner {
  display: none; width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white; border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== UPLOAD SECTION ===== */
#upload-section {
  max-width: 680px; margin: 3rem auto; padding: 0 1.25rem;
}

.section-heading {
  text-align: center; margin-bottom: 1.75rem;
  color: var(--navy); font-size: 1.5rem; font-weight: 800;
  letter-spacing: -0.01em;
}
.section-sub {
  text-align: center; color: var(--text-muted); font-size: 0.85rem;
  margin-top: 0.3rem; margin-bottom: 2rem;
}

.drop-zone {
  background: white; border: 2.5px dashed var(--gray-border);
  border-radius: 14px; padding: 2.75rem 2rem; text-align: center;
  cursor: pointer; transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
}
.drop-zone:hover, .drop-zone.over {
  border-color: var(--accent); background: var(--blue-light);
  box-shadow: 0 0 0 4px rgba(49,130,206,0.1);
}
.dz-icon { font-size: 3rem; margin-bottom: 0.85rem; }
.dz-title { font-size: 1.05rem; font-weight: 700; color: var(--navy); margin-bottom: 0.35rem; }
.dz-sub   { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 1.35rem; }

.btn-pick {
  background: var(--accent); color: white;
  padding: 0.55rem 1.6rem; border-radius: 7px; border: none;
  font-size: 0.88rem; font-weight: 700; cursor: pointer;
  transition: background 0.15s;
}
.btn-pick:hover { background: var(--blue); }

.or-divider {
  position: relative; text-align: center;
  color: var(--text-muted); font-size: 0.78rem; font-weight: 600;
  margin: 1.5rem 0; text-transform: uppercase; letter-spacing: 0.05em;
}
.or-divider::before, .or-divider::after {
  content: ''; position: absolute; top: 50%;
  width: calc(50% - 36px); height: 1px; background: var(--gray-border);
}
.or-divider::before { left: 0; } .or-divider::after { right: 0; }

.input-label {
  font-size: 0.75rem; font-weight: 700; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.5rem;
  display: block;
}

#md-input {
  width: 100%; height: 200px;
  border: 1.5px solid var(--gray-border); border-radius: 9px;
  padding: 0.9rem 1rem;
  font-family: 'Cascadia Code', 'Courier New', 'Consolas', monospace;
  font-size: 0.78rem; line-height: 1.6; color: var(--text);
  resize: vertical; outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  background: white;
}
#md-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(49,130,206,0.12);
}

.btn-render {
  display: block; width: 100%; margin-top: 0.85rem;
  background: var(--navy); color: white;
  padding: 0.75rem; border-radius: 9px; border: none;
  font-size: 0.95rem; font-weight: 800; cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  letter-spacing: 0.02em;
}
.btn-render:hover   { background: var(--blue); }
.btn-render:active  { transform: scale(0.99); }

/* ===== PREVIEW SECTION ===== */
#preview-section { display: none; max-width: 940px; margin: 0 auto 5rem; padding: 0 1.25rem; }

.preview-bar {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 0.85rem;
}
.preview-label {
  font-size: 0.7rem; font-weight: 800; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.1em;
}
.file-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 0.72rem; background: var(--blue-light);
  color: var(--blue); padding: 3px 10px; border-radius: 20px; font-weight: 700;
}

/* ===== DOCUMENT CONTENT ===== */
.document {
  background: white; border-radius: 10px;
  box-shadow: var(--shadow);
  padding: 3.5rem 4rem;
  line-height: 1.78; color: #1a202c;
  font-size: 0.94rem;
}

/* H1 — document title */
.document h1 {
  font-size: 1.85rem; color: var(--navy); font-weight: 900;
  text-align: center; line-height: 1.25;
  padding-bottom: 0.75rem; margin-bottom: 0.15rem;
  border-bottom: 3px solid var(--accent);
}

/* H3 immediately after H1 — subtitle line */
.document h1 + h3 {
  text-align: center; color: var(--text-muted);
  text-transform: none; letter-spacing: 0;
  font-size: 0.88rem; font-weight: 500;
  margin-top: 0.4rem; margin-bottom: 0;
  border: none; padding: 0;
}

/* H2 — section headers */
.document h2 {
  font-size: 1.08rem; color: var(--navy); font-weight: 800;
  margin: 2.5rem 0 0.8rem;
  padding: 0.5rem 0.85rem;
  border-left: 4px solid var(--accent);
  background: linear-gradient(90deg, rgba(49,130,206,0.06) 0%, transparent 100%);
  border-radius: 0 4px 4px 0;
}

/* H3 — subsection headers */
.document h3 {
  font-size: 0.85rem; color: var(--blue); font-weight: 800;
  margin: 1.6rem 0 0.55rem;
  text-transform: uppercase; letter-spacing: 0.06em;
  padding-bottom: 0.3rem;
  border-bottom: 1px solid var(--gray-border);
}

/* H4 */
.document h4 {
  font-size: 0.9rem; color: var(--text); font-weight: 700;
  margin: 1.2rem 0 0.4rem;
}

/* Paragraph */
.document p { margin: 0.65rem 0; }

/* Horizontal Rule */
.document hr {
  border: none; border-top: 1px solid var(--gray-border);
  margin: 1.75rem 0;
}

/* Tables */
.document table {
  width: 100%; border-collapse: collapse;
  margin: 1.1rem 0; font-size: 0.86rem;
  border-radius: 8px; overflow: hidden;
  box-shadow: 0 1px 6px rgba(0,0,0,0.07);
}
.document thead tr th {
  background: var(--navy); color: white;
  padding: 0.65rem 0.85rem; text-align: left;
  font-weight: 700; font-size: 0.82rem; letter-spacing: 0.02em;
}
.document tbody tr td {
  padding: 0.58rem 0.85rem;
  border-bottom: 1px solid #e2e8f0;
  vertical-align: top; line-height: 1.6;
}
.document tbody tr:nth-child(odd) td  { background: #fafbfd; }
.document tbody tr:nth-child(even) td { background: white; }
.document tbody tr:hover td { background: var(--blue-light); transition: background 0.12s; }
.document tbody tr:last-child td { border-bottom: none; }

/* Code blocks — for ASCII diagrams */
.document pre {
  background: #1a202c; color: #e2e8f0;
  border-radius: 10px; padding: 1.3rem 1.5rem;
  overflow-x: auto; margin: 1.1rem 0;
  font-size: 0.78rem; line-height: 1.65;
  border: 1px solid #2d3748;
}
.document pre code { background: none; color: inherit; padding: 0; font-size: inherit; }

/* Inline code */
.document :not(pre) > code {
  background: #f0f4f8; color: #c53030;
  padding: 1px 6px; border-radius: 4px;
  font-size: 0.85em; font-weight: 600;
  font-family: 'Courier New', monospace;
}

/* Lists */
.document ul, .document ol { padding-left: 1.6rem; margin: 0.6rem 0; }
.document li { margin: 0.28rem 0; }
.document ul li::marker { color: var(--accent); }

/* Blockquote — mnemonics */
.document blockquote {
  border-left: 4px solid var(--accent);
  background: var(--blue-light);
  padding: 0.8rem 1.1rem; margin: 1rem 0;
  border-radius: 0 8px 8px 0;
  font-style: normal;
}
.document blockquote p { margin: 0.2rem 0; }
.document blockquote strong { color: var(--navy); }

/* Strong */
.document strong { color: var(--navy); font-weight: 700; }

/* ===== TOAST ===== */
.toast {
  position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999;
  background: #2d3748; color: white;
  padding: 0.65rem 1.2rem; border-radius: 8px;
  font-size: 0.82rem; font-weight: 600;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  transform: translateY(20px); opacity: 0;
  transition: transform 0.25s, opacity 0.25s;
  pointer-events: none;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { background: #276749; }
.toast.error   { background: #c53030; }

/* ===== PRINT STYLES (PDF) ===== */
@media print {
  body { background: white !important; }

  .app-bar,
  #upload-section,
  .preview-bar,
  .toast { display: none !important; }

  #preview-section {
    display: block !important;
    max-width: 100%; margin: 0; padding: 0;
  }

  .document {
    box-shadow: none !important;
    border-radius: 0 !important;
    padding: 0 !important;
    margin: 0 !important;
    font-size: 10.5pt !important;
    line-height: 1.65 !important;
  }

  @page {
    size: A4;
    margin: 2.2cm 2.5cm 2.5cm 2.5cm;
  }

  .document h1 { font-size: 20pt !important; page-break-after: avoid; }
  .document h2 { font-size: 12pt !important; page-break-before: auto; page-break-after: avoid; }
  .document h3 { font-size: 9.5pt !important; page-break-after: avoid; }
  .document table { page-break-inside: avoid; font-size: 8.5pt !important; }
  .document pre  { page-break-inside: avoid; font-size: 7.5pt !important; }
  .document pre, .document blockquote { background-color: #f5f5f5 !important; color: #1a1a1a !important; }

  .document tbody tr:hover td { background: inherit !important; }
}
</style>
</head>
<body>

<!-- ===== APP BAR ===== -->
<header class="app-bar">
  <div class="app-bar-brand">
    <div class="app-bar-icon">📋</div>
    <div>
      <div class="app-bar-title">PMP Brief Formatter</div>
      <div class="app-bar-sub">Markdown → Styled DOCX &amp; PDF</div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-ghost" id="btn-clear" disabled onclick="clearAll()">
      ↺ New File
    </button>
    <button class="btn btn-docx" id="btn-docx" disabled onclick="downloadDocx()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      DOCX
    </button>
    <button class="btn btn-pdf" id="btn-pdf" disabled onclick="downloadPdf()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      PDF
    </button>
  </div>
</header>

<!-- ===== UPLOAD SECTION ===== -->
<section id="upload-section">
  <h1 class="section-heading">PMP Brief Formatter</h1>
  <p class="section-sub">Upload or paste your Markdown study brief → get a styled DOCX and PDF in seconds</p>

  <!-- Drag & drop zone -->
  <div class="drop-zone" id="drop-zone"
       ondragover="onDragOver(event)"
       ondragleave="onDragLeave(event)"
       ondrop="onDrop(event)"
       onclick="document.getElementById('file-input').click()">
    <div class="dz-icon">📄</div>
    <div class="dz-title">Drop your Markdown file here</div>
    <div class="dz-sub">Supports .md files &nbsp;·&nbsp; e.g. "1 Stakeholder Engagement.md"</div>
    <button class="btn-pick" onclick="event.stopPropagation(); document.getElementById('file-input').click()">
      Choose File
    </button>
    <input type="file" id="file-input" accept=".md,.txt" style="display:none" onchange="handleFileInput(event)">
  </div>

  <div class="or-divider">or paste markdown directly</div>

  <label class="input-label" for="md-input">Paste Markdown</label>
  <textarea id="md-input" placeholder="# PMP Exam Master Brief: ...&#10;&#10;Paste your full markdown content here and click the button below."></textarea>

  <button class="btn-render" onclick="renderFromTextarea()">
    Preview &amp; Format →
  </button>
</section>

<!-- ===== PREVIEW SECTION ===== -->
<section id="preview-section">
  <div class="preview-bar">
    <span class="preview-label">Formatted Preview</span>
    <span class="file-badge" id="file-badge">📄 brief.md</span>
  </div>
  <div class="document" id="doc-preview"></div>
</section>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<script>
// ── State
let currentMarkdown = '';
let currentFilename = 'brief';

// ── Marked configuration
marked.setOptions({ breaks: false, gfm: true });

// ── Toast helper
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => { t.className = 'toast ' + type; }, 2800);
}

// ── Drag & Drop
function onDragOver(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.add('over');
}
function onDragLeave() {
  document.getElementById('drop-zone').classList.remove('over');
}
function onDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('over');
  const file = e.dataTransfer.files[0];
  if (file) readFile(file);
}
function handleFileInput(e) {
  const file = e.target.files[0];
  if (file) readFile(file);
}

function readFile(file) {
  currentFilename = file.name.replace(/\.(md|txt)$/i, '');
  const reader = new FileReader();
  reader.onload = (e) => render(e.target.result);
  reader.onerror = () => showToast('Could not read file.', 'error');
  reader.readAsText(file);
}

function renderFromTextarea() {
  const md = document.getElementById('md-input').value.trim();
  if (!md) { showToast('Paste some markdown first.', 'error'); return; }
  currentFilename = 'brief';
  render(md);
}

// ── Render markdown → preview
function render(md) {
  currentMarkdown = md;

  // Extract filename from H1 if possible
  const h1Match = md.match(/^#\s+(.+)/m);
  if (h1Match) {
    currentFilename = h1Match[1]
      .replace(/[^a-z0-9\s-]/gi, '')
      .trim()
      .replace(/\s+/g, '_')
      .substring(0, 60) || 'brief';
  }

  const html = marked.parse(md);
  document.getElementById('doc-preview').innerHTML = html;

  // Show preview, hide upload
  document.getElementById('upload-section').style.display = 'none';
  document.getElementById('preview-section').style.display = 'block';

  // Update badge
  document.getElementById('file-badge').textContent = '📄 ' + currentFilename + '.md';

  // Enable header buttons
  setButtons(true);

  window.scrollTo({ top: 0, behavior: 'smooth' });
  showToast('Document formatted successfully.');
}

function setButtons(enabled) {
  ['btn-clear', 'btn-docx', 'btn-pdf'].forEach(id => {
    document.getElementById(id).disabled = !enabled;
  });
}

// ── Clear
function clearAll() {
  currentMarkdown = '';
  currentFilename = 'brief';
  document.getElementById('doc-preview').innerHTML = '';
  document.getElementById('md-input').value = '';
  document.getElementById('file-input').value = '';
  document.getElementById('upload-section').style.display = '';
  document.getElementById('preview-section').style.display = 'none';
  setButtons(false);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── PDF via browser print
function downloadPdf() {
  showToast('Opening print dialog — choose "Save as PDF".');
  setTimeout(() => window.print(), 400);
}

// ── DOCX via html-docx-js
function downloadDocx() {
  if (!currentMarkdown || typeof htmlDocx === 'undefined') {
    showToast('DOCX library not loaded. Check internet connection.', 'error');
    return;
  }

  const bodyHtml = marked.parse(currentMarkdown);

  // Full HTML document with Word-friendly styles
  const docHtml = `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body {
    font-family: Calibri, 'Segoe UI', Arial, sans-serif;
    font-size: 11pt; color: #1a202c; line-height: 1.65; margin: 0;
  }

  /* Title */
  h1 {
    font-size: 22pt; color: #1e3a5f; font-weight: 900;
    text-align: center;
    border-bottom: 3pt solid #3182ce;
    padding-bottom: 8pt; margin-bottom: 6pt; margin-top: 0;
  }

  /* Subtitle (h3 right after h1) */
  h1 + h3 {
    text-align: center; color: #718096; font-size: 10pt;
    font-weight: 400; margin-top: 4pt; margin-bottom: 12pt;
    text-transform: none; letter-spacing: 0; border: none;
  }

  /* Section headers */
  h2 {
    font-size: 13pt; color: #1e3a5f; font-weight: 800;
    border-left: 4pt solid #3182ce;
    padding: 4pt 8pt; margin-top: 20pt; margin-bottom: 8pt;
    background-color: #f5f8ff;
  }

  /* Subsection headers */
  h3 {
    font-size: 9.5pt; color: #2c5282; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.05em;
    border-bottom: 0.75pt solid #cbd5e0;
    padding-bottom: 3pt; margin-top: 14pt; margin-bottom: 5pt;
  }

  h4 { font-size: 10pt; font-weight: 700; margin: 10pt 0 4pt; }

  p   { margin: 4pt 0 5pt; }

  strong { color: #1e3a5f; font-weight: 700; }

  em { font-style: italic; color: #2c5282; }

  hr { border: none; border-top: 0.75pt solid #cbd5e0; margin: 12pt 0; }

  /* Tables */
  table {
    width: 100%; border-collapse: collapse;
    margin: 8pt 0; font-size: 9pt;
  }
  th {
    background-color: #1e3a5f; color: white;
    padding: 5pt 8pt; text-align: left;
    font-weight: 700; font-size: 8.5pt;
  }
  td {
    padding: 4.5pt 8pt;
    border-bottom: 0.5pt solid #e2e8f0;
    vertical-align: top; line-height: 1.5;
  }
  tr:nth-child(even) td { background-color: #f7fafc; }

  /* Code blocks */
  pre {
    background-color: #1a202c; color: #e2e8f0;
    padding: 10pt 12pt; font-size: 8pt;
    font-family: 'Courier New', Courier, monospace;
    margin: 8pt 0; line-height: 1.55;
  }
  code {
    font-family: 'Courier New', Courier, monospace;
    font-size: 8.5pt;
  }
  p code, li code, td code {
    background-color: #f0f4f8; color: #c53030;
    padding: 0pt 3pt; font-size: 8pt;
  }

  /* Lists */
  ul, ol { padding-left: 18pt; margin: 4pt 0; }
  li { margin: 2pt 0; }

  /* Blockquote — mnemonics */
  blockquote {
    border-left: 3pt solid #3182ce;
    background-color: #ebf4ff;
    padding: 6pt 10pt; margin: 8pt 0;
  }
  blockquote p { margin: 2pt 0; }
</style>
</head>
<body>
${bodyHtml}
</body>
</html>`;

  try {
    const blob = htmlDocx.asBlob(docHtml, {
      orientation: 'portrait',
      margins: { top: 1080, right: 1080, bottom: 1080, left: 1080 }
    });
    saveAs(blob, currentFilename + '.docx');
    showToast('DOCX downloaded.');
  } catch (err) {
    console.error(err);
    showToast('DOCX generation failed. See console.', 'error');
  }
}

// ── Keyboard shortcut: Ctrl/Cmd+P = PDF, Ctrl/Cmd+D = DOCX
document.addEventListener('keydown', (e) => {
  const mod = e.ctrlKey || e.metaKey;
  if (mod && e.key === 'd' && !document.getElementById('btn-docx').disabled) {
    e.preventDefault(); downloadDocx();
  }
});
</script>
</body>
</html>
